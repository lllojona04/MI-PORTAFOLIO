<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Proyecto | Jona Photos</title>
<link rel="stylesheet" href="style.css">

<style>
/* Mejora de legibilidad y limpieza */
.hero {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    background-size: cover;
    background-position: center;
}

/* Capa oscura para que el texto no se pierda con el fondo */
.hero::before {
    content: "";
    position: absolute;
    top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.5); /* Oscurece un poco la portada */
    z-index: 1;
}

.hero-content {
    position: relative;
    z-index: 2; /* Sube el texto por encima de la capa oscura */
    max-width: 800px;
    padding: 20px;
}

#proy-desc { white-space: pre-line; }

/* Galería a pantalla completa y rápida */
.modal {
    background: #000; /* Fondo totalmente negro para que resalte la foto */
}

.img-carrusel {
    max-height: 90vh;
    max-width: 95vw;
    transition: opacity 0.15s ease-in-out; /* Más rápido que antes */
    user-select: none;
}

@media(max-width:768px){
  .hero-content h1{font-size:1.8rem; letter-spacing:4px}
  .hero-content .desc{font-size:0.9rem; line-height:1.4}
  .btn-nav { font-size: 40px; padding: 20px; } /* Flechas más fáciles de tocar */
}
</style>
</head>

<body>

<section id="hero-proyecto" class="hero">
    <a href="index.html" class="btn-back">← VOLVER</a>

    <div class="hero-content">
        <h1 id="t"></h1>
        <p class="fecha" id="f"></p>
        <p class="desc" id="d"></p>
        <button class="btn-gallery" onclick="openGal()">VER GALERÍA</button>
    </div>
</section>

<div id="m" class="modal" onclick="bgClose(event)">
    <span class="close-modal" onclick="closeGal()">&times;</span>
    <button class="btn-nav prev" onclick="img(-1)">&#10094;</button>
    <img id="i" class="img-carrusel">
    <button class="btn-nav next" onclick="img(1)">&#10095;</button>
</div>

<script src="data.js"></script>

<script>
const m = window.innerWidth <= 768,
      $ = s => document.querySelector(s),
      params = new URLSearchParams(location.search),
      p = proyectos.find(x => x.id == params.get("id"));

if(!p) location = "index.html";

// Cargar datos iniciales
$("#t").textContent = p.titulo;
$("#f").textContent = p.fecha;
$("#d").textContent = m ? p.descripcion.mobile : p.descripcion.desktop;
$("#hero-proyecto").style.backgroundImage = `url('${p.portada}')`;
document.title = p.titulo + " | Jona Photos";

let idx = 0;
const modal = $("#m"), imgEl = $("#i");

// --- FUNCIÓN MÁGICA: Precarga de imágenes ---
// Esto hace que Vercel descargue las fotos antes de que les des click
function preloadImages() {
    p.galeria.forEach(url => {
        const img = new Image();
        img.src = url;
    });
}
preloadImages(); // Se ejecuta al abrir la página

function openGal(){
    modal.style.display = "flex";
    idx = 0;
    show();
    document.body.style.overflow = "hidden";
}

function closeGal(){
    modal.style.display = "none";
    document.body.style.overflow = "auto";
}

function bgClose(e){ if(e.target == modal) closeGal(); }

function img(n){
    idx = (idx + n + p.galeria.length) % p.galeria.length;
    show();
}

function show(){
    // Cambio casi instantáneo
    imgEl.style.opacity = 0.5; 
    imgEl.src = p.galeria[idx];
    imgEl.onload = () => { imgEl.style.opacity = 1; };
}

// Teclado
document.addEventListener("keydown", e => {
    if(modal.style.display == "flex"){
        if(e.key == "Escape") closeGal();
        if(e.key == "ArrowRight") img(1);
        if(e.key == "ArrowLeft") img(-1);
    }
});

// Swipe para móvil
let sx = 0;
modal.ontouchstart = e => sx = e.touches[0].clientX;
modal.ontouchend = e => {
    let dx = e.changedTouches[0].clientX - sx;
    if(Math.abs(dx) > 50) img(dx < 0 ? 1 : -1);
};
</script>
</body>
</html>
